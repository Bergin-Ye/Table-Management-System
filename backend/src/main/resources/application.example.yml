server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/metal_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.metal.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

pagehelper:
  helper-dialect: mysql
  reasonable: false
  support-methods-arguments: true
  params: count=countSql
  page-size-zero: true

# JWT 配置
app:
  jwt:
    secret: 你的JWT密钥(任意长字符串)
    expiration-ms: 86400000  # 24 hours

# 阿里云 OCR 配置 — 在此填入你的 AccessKey
# 获取地址: https://ram.console.aliyun.com/manage/ak
ocr:
  aliyun:
    access-key-id: 你的AccessKeyId
    access-key-secret: 你的AccessKeySecret
    endpoint: ocr-api.cn-hangzhou.aliyuncs.com
