server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/metal_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: haoyu2026
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.metal.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

pagehelper:
  helper-dialect: mysql
  reasonable: false
  support-methods-arguments: true
  params: count=countSql
  page-size-zero: true

# JWT 配置
app:
  jwt:
    secret: metal-system-jwt-secret-key-2026-very-long-secret-key-for-hs256
    expiration-ms: 86400000  # 24 hours
